# Define the RTOS before sourcing the target
#set ESP_RTOS Zephyr

# Source the JTAG interface configuration file
source [find interface/esp_usb_jtag.cfg]

# Source the ESP32-S3 configuration file
source [find target/esp32s3.cfg]

esp32s3.cpu0 configure -rtos Zephyr

# FORCE hardware breakpoints
# The S3 has limited hardware breakpoints (usually 2-8),
# but this prevents the "not writable" error in Flash.
gdb breakpoint_override hard
gdb port 3333