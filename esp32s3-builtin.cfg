source [find interface/esp_usb_jtag.cfg]
source [find target/esp32s3.cfg]

gdb breakpoint_override hard
esp32s3.cpu0 configure -rtos Zephyr
adapter speed 20000

# Zephyr simple boot puts the app at slot0 (0x20000), not at the default 0x10000.
# Without this, OpenOCD reads the sys partition at 0x10000, sees no valid image,
# and leaves irom/drom banks at 0 KB, causing all breakpoints beyond main() to fail.
init
esp32s3.cpu0.flash appimage_offset 0x20000